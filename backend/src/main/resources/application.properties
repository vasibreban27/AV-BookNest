spring.application.name=backend
server.port=8085
# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Dialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Multipart book covers. The service also validates type and size before upload.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Cloudinary server-side uploads. Never expose API_SECRET to the frontend.
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:}
app.cloudinary.max-file-size=5MB

# Authentication - JWT_SECRET must contain at least 32 characters.
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=15m
app.jwt.refresh-token-expiration=7d

# Comma-separated origins allowed to call the API from a browser.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Sameday eAWB API. Keep disabled until contract credentials and the Basic
# service/pickup point identifiers are available.
app.sameday.enabled=${SAMEDAY_ENABLED:false}
app.sameday.base-url=${SAMEDAY_BASE_URL:https://api.sameday.ro}
app.sameday.username=${SAMEDAY_USERNAME:}
app.sameday.password=${SAMEDAY_PASSWORD:}
app.sameday.service-id=${SAMEDAY_SERVICE_ID:}
app.sameday.pickup-point-id=${SAMEDAY_PICKUP_POINT_ID:}
